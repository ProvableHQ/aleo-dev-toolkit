packages:
  - 'packages/*'
  - 'packages/aleo-wallet-adaptor/core'
  - 'packages/aleo-wallet-adaptor/react'
  - 'packages/aleo-wallet-adaptor/react-ui'
  - 'packages/aleo-wallet-adaptor/wallets/leo'
  - 'packages/aleo-wallet-adaptor/wallets/puzzle'
  - 'packages/aleo-wallet-adaptor/wallets/shield'
  - 'packages/aleo-wallet-adaptor/wallets/fox'
  - 'packages/aleo-wallet-adaptor/wallets/soter'
  - 'examples/*'
  - 'website'

# Reduce the likelihood of installing compromised packages by refusing
# anything published within the last 7 days. Mirrors galileo-extension's
# `npmMinimalAgeGate: 7d`. The first-party @provablehq registry deps are
# exempt so we can pick up new SDK / wasm releases immediately; the
# aleo-wallet-adaptor-* packages live in this workspace and aren't gated.
# NB: requires pnpm >= 10.16 to take effect (see packageManager pin).
minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - '@provablehq/sdk'
  - '@provablehq/wasm'
